# tbls configuration for DynamoDB schema documentation.
#
# IMPORTANT: tbls の DynamoDB driver は DSN クエリの endpoint パラメータを認識しない。
# DynamoDB Local に接続するには AWS_ENDPOINT_URL=http://localhost:8000 を環境変数で
# 併用すること。Makefile の `db-docs` ターゲット経由で実行するのが正規の手順。
#
# `tbls doc` を素手で打つと AWS 本番に誤接続する可能性があるため、必ず `make db-docs`
# を使うこと。詳細は docs/db/index.md。

dsn: dynamo://ap-northeast-1?aws_access_key_id=local&aws_secret_access_key=local

docPath: docs/db/schema

format:
  adjust: true
  sort: false

include:
  - gakushu

# tbls の DynamoDB driver は DescribeTable の AttributeDefinitions しかカラム化しない。
# このテーブルは pk と sk の2属性しか宣言されていないため、自動生成されるカラム表は
# 2行だけになる。実アイテムの属性 (displayName, score, audioBase64 等) は出力されない。
# また TTL 属性 (ttl) も AttributeDefinitions に含まれないため tbls 出力に出ない。
# よって意味のある補足は以下の comments と、docs/db/entities.md / access-patterns.md
# (手書き) に書く。
comments:
  - table: gakushu
    tableComment: |
      Single-table design. 4 logical entities (User Profile / Progress / Quiz / Narration cache)
      are stored under different PK/SK prefixes. TTL on `ttl` attribute (Unix timestamp) for
      cache expiry. See ../entities.md and ../access-patterns.md for full attribute definitions
      (tbls cannot infer non-key attributes from DynamoDB).
    columnComments:
      pk: |
        Partition key. Prefix determines the entity scope:
          USER#{cognito_sub}        User-scoped data (Profile / Progress / Quiz)
          NARR#{chapterId}          Narration cache (shared across users)
      sk: |
        Sort key. Prefix determines the entity type:
          PROFILE                                User profile (single per user)
          PROG#{chapterId}                       Learning progress per chapter
          QUIZ#{chapterId}#{ISO8601}             Quiz result history
          LANG#ja                                Narration cache language variant
