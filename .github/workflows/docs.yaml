name: Deploy API Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "api/schemas/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: api/pnpm-lock.yaml

      - name: Generate OpenAPI spec
        run: |
          cd api
          pnpm install --frozen-lockfile
          pnpm run generate-openapi

      # Jekyll で docs/db/ を HTML 化 (tbls 出力 Markdown と手書き補足を Pages 上で読める形に)
      - uses: actions/configure-pages@v5
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs/db
          destination: ./_jekyll_db

      # 既存 docs/ (Swagger UI + OpenAPI + architecture.*) と Jekyll 出力をマージ
      - name: Merge Pages content
        run: |
          mkdir -p _site
          cp -r docs/. _site/
          rm -rf _site/db
          cp -r _jekyll_db _site/db

      - uses: actions/upload-pages-artifact@v3
        # path はデフォルト ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
