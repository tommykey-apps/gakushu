name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "api/**"
      - "web/**"
      - "infra/**"
  merge_group:
    branches: [main]

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: api/pnpm-lock.yaml

      - name: Install, build, and test
        run: |
          cd api
          pnpm install --frozen-lockfile
          pnpm run build
          pnpm test

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install and build
        run: |
          cd web
          pnpm install --frozen-lockfile
          pnpm run build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: TypeScript type check
        run: |
          cd web
          pnpm install --frozen-lockfile
          pnpm run check
